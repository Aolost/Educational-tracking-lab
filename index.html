<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educational Tracking Lab</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #333; }
        .status { margin-top: 20px; font-weight: bold; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .info { background: #d1ecf1; color: #0c5460; }
        pre { background: #eee; padding: 10px; border-radius: 5px; font-size: 0.8rem; text-align: left; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔍 Educational Tracking Lab</h1>
        <p><strong>Note:</strong> This is a demo. Your basic data (IP, Device) is logged automatically for educational purposes.</p>
        
        <div id="status" class="status info">⏳ Initializing tracking...</div>
        
        <div style="margin-top: 20px;">
            <h3>Data Collected:</h3>
            <pre id="data-preview">Loading...</pre>
        </div>
    </div>

    <script>
        // ⚠️ PASTE YOUR WORKER URL HERE
        const API_URL = 'https://educational-tracking-lab.aolost-dev.workers.dev'; 

        async function track() {
            const status = document.getElementById('status');
            const preview = document.getElementById('data-preview');
            
            // 1. Gather Basic Data (Automatic)
            const data = {
                userAgent: navigator.userAgent,
                language: navigator.language,
                screen: `${window.screen.width}x${window.screen.height}`,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                timestamp: new Date().toISOString(),
                type: "auto-track"
            };

            // 2. Get Public IP (Optional - adds detail)
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const ip = await res.json();
                data.ip = ip.ip;
            } catch (e) {
                data.ip = "Hidden by Browser";
            }

            // 3. Show Preview to User (Transparency)
            preview.innerText = JSON.stringify(data, null, 2);

            // 4. Send to Backend (Silent)
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                status.innerText = "✅ Data logged successfully (Check Cloudflare Dashboard)";
                status.className = "status success";
            } catch (e) {
                status.innerText = "❌ Error sending data";
                status.className = "status error";
            }

            // 5. Request GPS (Optional - Will show popup)
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        data.latitude = pos.coords.latitude;
                        data.longitude = pos.coords.longitude;
                        // Update preview with GPS
                        preview.innerText = JSON.stringify(data, null, 2);
                        // Send updated data
                        fetch(API_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(data)
                        });
                    },
                    () => {} // Ignore if denied
                );
            }
        }

        // 🚀 Run Immediately on Page Load
        window.onload = track;
    </script>
</body>
</html>
